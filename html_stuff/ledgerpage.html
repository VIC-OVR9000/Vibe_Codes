<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ledger Command Center</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .header { height: 40px; border-bottom: 1px solid #30363d; }
        .container { display: grid; grid-template-columns: 300px 1fr 350px; height: calc(100vh - 40px); gap: 10px; padding: 10px; box-sizing: border-box; }
        .col { display: flex; flex-direction: column; gap: 10px; }
        .widget-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; padding: 10px; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <div class="tradingview-widget-container">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
          "symbols": [
            {"proName": "NASDAQ:NVDA", "title": "NVDA"}, {"proName": "NASDAQ:PLTR", "title": "PLTR"},
            {"proName": "NYSE:LLY", "title": "LLY"}, {"proName": "NASDAQ:MSFT", "title": "MSFT"},
            {"proName": "AMEX:GLD", "title": "GOLD"}, {"proName": "NYSE:XLE", "title": "ENERGY"}
          ],
          "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
        }
        </script>
    </div>
</div>

<div class="container">
    <div class="col">
        <div class="widget-box" style="height: 250px;">
            <h3>Market Sentiment</h3>
            <img src="https://alternative.me/crypto/fear-and-greed-index.png" style="width:100%; border-radius:5px;">
        </div>
        <div class="widget-box" style="flex-grow: 1;">
            <h3>Market Overview</h3>
            <div id="tv-market-overview" style="height: 100%;"></div>
        </div>
    </div>

    <div class="col">
        <div class="widget-box" style="flex-grow: 1; padding: 0;">
            <div id="tradingview_master" style="height: 100%;"></div>
        </div>
    </div>

    <div class="col">
        <div class="widget-box" style="height: 450px;">
            <h3>Technical Gauge</h3>
            <div id="tv-gauge"></div>
        </div>
        <div class="widget-box" style="flex-grow: 1;">
            <h3>Ledger Assets</h3>
            <p style="font-size: 12px; color: #8b949e;">Click a ticker in the master chart to analyze.</p>
            <div style="font-size: 24px; color: #23d18b;">Total: $66,903.07</div>
        </div>
    </div>
</div>

<script>
    // 1. Initialize Master Chart (NVDA default)
    new TradingView.widget({
        "autosize": true,
        "symbol": "NASDAQ:NVDA",
        "interval": "D",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "container_id": "tradingview_master",
        "allow_symbol_change": true,
        "hide_side_toolbar": false
    });

    // 2. Initialize Technical Gauge (linked to PLTR as example)
    new TradingView.MediumWidget({
        "symbols": [ ["PLTR", "NASDAQ:PLTR|1D"] ],
        "chartOnly": false,
        "width": "100%", "height": "100%",
        "locale": "en", "colorTheme": "dark",
        "container_id": "tv-gauge"
    });
</script>

</body>
</html>
